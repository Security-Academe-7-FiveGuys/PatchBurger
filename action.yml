name: "FiveGuys Security Scan"
description: "FiveGuys Security Scan API로 의존성 파일을 검사합니다."

inputs:
  api-url:
    description: "FiveGuys /query/file-check API 주소"
    required: false
    default: "http://43.200.169.247:8081/query/file-check"

  deploy-on-risk:
    description: "WARNING 또는 CRITICAL 항목이 발견되어도 이후 workflow를 계속 진행할지 여부"
    required: false
    default: "false"

  dependency-files:
    description: "사용자 지정 의존성 파일 목록. 형식: path:fileType:ecosystem, 한 줄에 하나씩 입력"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run FiveGuys Security Scan
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scan.sh"
        "${{ github.action_path }}/scan.sh"
      env:
        FIVEGUYS_API_URL: ${{ inputs.api-url }}
        FIVEGUYS_DEPLOY_ON_RISK: ${{ inputs.deploy-on-risk }}
        FIVEGUYS_DEPENDENCY_FILES: ${{ inputs.dependency-files }}
