name: "FiveGuys Security Scan"
description: "Scan dependency files with the FiveGuys Security Scan API"

inputs:
  api-url:
    description: "FiveGuys /query/file-check API URL"
    required: false
    default: "http://43.200.169.247:8081/query/file-check"

  deploy-on-risk:
    description: "Continue workflow even if WARNING or CRITICAL items are found"
    required: false
    default: "false"

  dependency-files:
    description: "Custom dependency files. Format: path:fileType:ecosystem, one item per line"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run FiveGuys Security Scan
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scan.sh"
        "${{ github.action_path }}/scan.sh"
      env:
        FIVEGUYS_API_URL: ${{ inputs.api-url }}
        FIVEGUYS_DEPLOY_ON_RISK: ${{ inputs.deploy-on-risk }}
        FIVEGUYS_DEPENDENCY_FILES: ${{ inputs.dependency-files }}
